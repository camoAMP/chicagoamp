spring:
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/chicago_amp}
    username: ${DATABASE_USERNAME:postgres}
    password: ${DATABASE_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: ${PORT:8080}

chicagoamp:
  storage:
    images-path: ${IMAGE_STORAGE_PATH:./storage/images}
  vimeo:
    access-token: ${VIMEO_ACCESS_TOKEN:}
    api-base: ${VIMEO_API_BASE:https://api.vimeo.com}
    download-max-bytes: ${VIMEO_DOWNLOAD_MAX_BYTES:8388608}
  cors:
    allowed-origins: ${CHICAGO_AMP_ALLOWED_ORIGINS:*}

logging:
  level:
    org.hibernate.SQL: WARN
